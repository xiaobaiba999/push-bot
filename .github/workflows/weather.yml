name: WeChat Weather Push

on:
  schedule:
    - cron: '0 0,2,4,6,8,10 * * *'   # 每2小时: 北京时间 8/10/12/14/16/18点
  workflow_dispatch:

jobs:
  weather_push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run weather push only
        env:
          TZ: Asia/Shanghai
        run: node -e "const {weatherPush} = require('./index'); weatherPush().then(r => console.log('WEATHER_PUSH_RESULT:', r)).catch(e => console.error('WEATHER_PUSH_ERROR:', e.message))"
