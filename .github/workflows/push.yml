name: WeChat Daily Push

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run push bot
        env:
          NV_API_KEY: ${{ secrets.NV_API_KEY }}
          TZ: Asia/Shanghai
        run: node -e "const {handler} = require('./index'); handler().then(r => console.log('PUSH_RESULT:', r)).catch(e => console.error('PUSH_ERROR:', e.message))"
